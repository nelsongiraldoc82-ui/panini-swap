#login{background:linear-gradient(180deg,#020503,#041a0c 35%,var(--grass) 80%,#073d1e);z-index:50;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.lflog{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:min(600px,120vw);height:50%;opacity:.1;pointer-events:none}

.nb i{font-size:1.15rem}.nb.on{color:var(--accent)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px;padding:0 16px}
.sc{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;background:var(--card);transition:transform .12s;aspect-ratio:3/4;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}

.sc .sbg{position:absolute;top:4px;right:4px;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.48rem;color:#fff;padding:0 3px;font-weight:700}

.tss{overflow:hidden;transition:max-height .4s ease}.tss.col{max-height:0!important}

.mc{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin:0 16px 8px;cursor:pointer;transition:background .2s;-webkit-tap-highlight-color:transparent}
.mc:hover{background:var(--card2)}
.msm{width:38px;height:50px;border-radius:5px;border:2px solid var(--err);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg2);gap:1px;overflow:hidden}

.mt{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;-webkit-tap-highlight-color:transparent}
.mt:hover{background:var(--card)}.mu{position:relative}.mu::after{content:'';position:absolute;top:10px;right:10px;width:8px;height:8px;background:var(--accent);border-radius:50%}
.ma{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;flex-shrink:0;color:#fff}
.cmsg{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.cb{max-width:80%;padding:10px 14px;border-radius:14px;font-size:.83rem;line-height:1.4;word-wrap:break-word}
.cb.rx{background:var(--card);border-bottom-left-radius:4px;align-self:flex-start}.cb.sx{background:rgba(201,168,76,.13);border-bottom-right-radius:4px;align-self:flex-end}
.cb .btm{font-size:.6rem;color:var(--muted);margin-top:4px}
.cib{display:flex;gap:8px;padding:8px 16px;background:rgba(6,11,8,.95);border-top:1px solid var(--border)}
.cin{flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--txt);font-size:.83rem;outline:none;font-family:'DM Sans',sans-serif}.cin:focus{border-color:var(--accent)}
.csn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;color:#000;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mo{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mo.sh{opacity:1;pointer-events:all}.mst{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px;transform:translateY(100%);transition:transform .3s}
.mo.sh .mst{transform:translateY(0)}.mhd{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.tst{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:200;padding:11px 20px;border-radius:10px;font-size:.83rem;font-weight:500;transition:transform .3s;max-width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.tst.sh{transform:translateX(-50%) translateY(0)}.tst.suc{background:var(--ok);color:#000}.tst.err{background:var(--err);color:#fff}.tst.inf{background:var(--accent);color:#000}
.prg{transform:rotate(-90deg)}.prgb{fill:none;stroke:var(--border);stroke-width:3}.prgf{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dasharray .6s}
.stc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stn{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}.stl{font-size:.65rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.bp{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#000;font-weight:700;font-size:.95rem;border:none;cursor:pointer;transition:background .2s,transform .1s;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.bp:hover{background:var(--accent2)}.bp:active{transform:scale(.98)}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bs{padding:9px 16px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--txt);font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.bs:hover{border-color:var(--accent);color:var(--accent)}
.bsm{padding:6px 12px;font-size:.72rem;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.shd{background:linear-gradient(135deg,#00bfff 0%,#e0f7fa 25%,#00bfff 50%,#e0f7fa 75%,#00bfff 100%)!important;background-size:200% 200%!important;animation:shm 1.5s ease infinite!important}

.apf{height:100%;background:var(--accent);border-radius:3px}
.linp{width:100%;padding:14px 16px;background:rgba(12,21,16,.8);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:1.1rem;letter-spacing:.15em;text-transform:uppercase;text-align:center;transition:border-color .2s;outline:none;font-family:'DM Sans',sans-serif}

.conn-dot.load{background:var(--warn);animation:ldsp 1s linear infinite}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

function toast(m,t){const el=document.getElementById('toast');el.textContent=m;el.className='tst '+t;requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('sh')));clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('sh'),2800)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtT(ts){if(!ts)return '';const n=Date.now()-ts;if(n<6e4)return 'ahora';if(n<36e5)return Math.floor(n/6e4)+'m';if(n<864e5)return Math.floor(n/36e5)+'h';return new Date(ts).getDate()+'/'+(new Date(ts).getMonth()+1)}
function uidC(id){let h=0;for(let i=0;i<id.length;i++)h=((h<<5)-h)+id.charCodeAt(i);return Math.abs(h)%360}

async function doLogin(){
    const code=document.getElementById('inp-code').value.trim().toUpperCase();
    const err=document.getElementById('err-login');
    if(!code){err.textContent='Ingresa tu codigo';return}
    err.textContent='';
    const btn=document.getElementById('btn-login');btn.disabled=true;btn.textContent='Verificando...';
    try{
        const r=await apiGet({a:'login',id:code});
        if(r.error){err.textContent=r.error;btn.disabled=false;btn.textContent='Ingresar';return}
        curUser=r.id;curData=r;
        localStorage.setItem('panini_code',code);
        document.getElementById('htitle').textContent=r.name;
        showScr('app');go('album');toast('Bienvenido, '+r.name,'suc');
    }catch(e){err.textContent='Error de conexion. Intenta de nuevo.'}
    btn.disabled=false;btn.textContent='Ingresar';
}

}

/* ================================================================

function go(tab){

    document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.t===tab));
    document.getElementById('btn-back').style.display='none';
    document.getElementById('htitle').textContent=curUser==='__ADMIN__'?'Admin':(curData?.name||'');
    const c=document.getElementById('ac');c.scrollTop=0;
    if(curUser==='__ADMIN__'){renderAdmin(c);return}
    ({album:renderAlbum,buscar:renderBuscar,mensajes:renderMsgs,perfil:renderPerfil})[tab](c);
}
function pushV(title,fn){navStack.push({tab:curTab,title:document.getElementById('htitle').textContent});document.getElementById('htitle').textContent=title;document.getElementById('btn-back').style.display='block';const c=document.getElementById('ac');c.scrollTop=0;fn(c)}
function goBack(){
    if(!navStack.length)return;const p=navStack.pop();
    document.getElementById('htitle').textContent=p.title;document.getElementById('btn-back').style.display=navStack.length?'block':'none';
    const c=document.getElementById('ac');c.scrollTop=0;
    if(curUser==='__ADMIN__'){renderAdmin(c);return}
    ({album:renderAlbum,buscar:renderBuscar,mensajes:renderMsgs,perfil:renderPerfil})[p.tab](c);

/* ================================================================

   ================================================================ */
function renderAlbum(c){
    const s=curData.stickers||{};
    let have=0,rep=0;ALL.forEach(st=>{if(s[st.num]){have++;if(s[st.num]>1)rep++}});
    const pct=Math.round(have/TOTAL*100),circ=2*Math.PI*46,dash=pct/100*circ;
    let h=`<div class="p-4 pb-2"><div class="flex items-center gap-4"><div class="relative" style="width:100px;height:100px;flex-shrink:0"><svg width="100" height="100" class="prg"><circle cx="50" cy="50" r="46" class="prgb"/><circle cx="50" cy="50" r="46" class="prgf" stroke-dasharray="${dash} ${circ}"/></svg><div class="absolute inset-0 flex items-center justify-center"><span class="fd" style="font-size:1.5rem;color:var(--accent)">${pct}%</span></div></div><div class="flex-1"><div style="font-size:.8rem;color:var(--muted);margin-bottom:6px">${have} de ${TOTAL} cromos</div><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:${pct}%;background:var(--ok);border-radius:3px"></div></div><div class="flex gap-4" style="font-size:.7rem"><span style="color:var(--ok)"><i class="fas fa-check-circle"></i> ${have}</span><span style="color:var(--warn)"><i class="fas fa-clone"></i> ${rep} rep</span><span style="color:var(--err)"><i class="fas fa-times-circle"></i> ${TOTAL-have}</span></div></div></div></div>
    <div class="fb" id="af"><button class="fbt ${albumFilter==='all'?'on':''}" data-f="all">Todos</button><button class="fbt ${albumFilter==='missing'?'on':''}" data-f="missing">Faltantes</button><button class="fbt ${albumFilter==='have'?'on':''}" data-f="have">Tenidos</button><button class="fbt ${albumFilter==='repeated'?'on':''}" data-f="repeated">Repetidos</button><button class="fbt ${albumFilter==='extra'?'on':''}" data-f="extra">Panini Extra</button></div>`;
    c.innerHTML=h;
    c.querySelectorAll('#af .fbt').forEach(b=>b.addEventListener('click',()=>{albumFilter=b.dataset.f;renderAlbum(document.getElementById('ac'))}));
    // Panini Extra
    if(albumFilter!=='missing'){
        const extras=ALL.filter(st=>st.tp==='extra');
        const fex=extras.filter(st=>{if(albumFilter==='all'||albumFilter==='extra')return true;if(albumFilter==='have')return!!s[st.num];if(albumFilter==='repeated')return(s[st.num]||0)>1;return false});
        if(fex.length){const ic=collapsed.has('EXTRA');let eh=`<div class="ts"><div class="th" data-team="EXTRA"><div class="tcd" style="background:linear-gradient(90deg,#cd7f32,#c0c0c0,#ffd700,#00bcd4)"></div><span style="font-size:.85rem;font-weight:600;flex:1">Panini Extra</span><span style="font-size:.7rem;color:var(--muted)">${extras.filter(x=>!!s[x.num]).length}/${extras.length}</span><i class="fas fa-chevron-${ic?'right':'down'}" style="color:var(--muted);font-size:.7rem"></i></div><div class="tss ${ic?'col':''}" style="max-height:2000px"><div class="sg">`;fex.forEach(st=>{const q=s[st.num]||0;eh+=stH(st,q===0?'mis':q===1?'hav':'rep',q)});eh+=`</div></div></div>`;c.insertAdjacentHTML('beforeend',eh);c.querySelector('[data-team="EXTRA"]').addEventListener('click',()=>{toggleCol('EXTRA');renderAlbum(document.getElementById('ac'))})}
    }
    // Equipos
    EQ.forEach(eq=>{
        const tS=ALL.filter(st=>st.team===eq.c),hT=tS.filter(st=>!!s[st.num]).length;
        const ft=tS.filter(st=>{if(albumFilter==='all')return true;if(albumFilter==='missing')return!s[st.num];if(albumFilter==='have')return!!s[st.num];if(albumFilter==='repeated')return(s[st.num]||0)>1;return false});
        if(albumFilter==='missing'&&!ft.length)return;
        const ic=collapsed.has(eq.c);
        let eh=`<div class="ts"><div class="th" data-team="${eq.c}"><div class="tcd" style="background:${eq.cl}"></div><span style="font-size:.85rem;font-weight:600;flex:1">${eq.n}</span><div class="tpb"><div class="tpf" style="width:${hT/tS.length*100}%"></div></div><span style="font-size:.7rem;color:var(--muted);margin-left:6px">${hT}/${tS.length}</span><i class="fas fa-chevron-${ic?'right':'down'}" style="color:var(--muted);font-size:.7rem;margin-left:4px"></i></div><div class="tss ${ic?'col':''}" style="max-height:3000px"><div class="sg">`;
        ft.forEach(st=>{const q=s[st.num]||0;eh+=stH(st,q===0?'mis':q===1?'hav':'rep',q)});eh+=`</div></div></div>`;
        c.insertAdjacentHTML('beforeend',eh);c.querySelector(`[data-team="${eq.c}"]`).addEventListener('click',()=>{toggleCol(eq.c);renderAlbum(document.getElementById('ac'))});
    });
    c.querySelectorAll('.sc[data-num]').forEach(el=>el.addEventListener('click',()=>openSticker(parseInt(el.dataset.num))));
}

function toggleCol(code){collapsed.has(code)?collapsed.delete(code):collapsed.add(code)}
function stH(st,cls,qty){let bg='',xc='';if(cls==='hav')bg=`<div class="sbg hb"><i class="fas fa-check" style="font-size:.45rem"></i></div>`;else if(cls==='rep')bg=`<div class="sbg rb">${qty}</div>`;if(st.shm)xc=st.shm;const ico=st.tp==='shield'?'<i class="fas fa-shield-halved" style="font-size:.45rem;color:var(--muted)"></i>':st.tp==='group'?'<i class="fas fa-users" style="font-size:.45rem;color:var(--muted)"></i>':st.tp==='extra'?`<i class="fas fa-star" style="font-size:.45rem;color:${st.cl}"></i>`:'';return`<div class="sc ${cls}" data-num="${st.num}"><div class="st ${xc}" style="background:${st.cl}"></div><div class="sbd"><div class="sn">${st.num}</div>${ico}<div class="sna">${st.n}</div></div>${bg}</div>`}

async function openSticker(num){

    openModal();
    const setQ=async v=>{if(v<0)v=0;const st2={...curData.stickers};if(v===0)delete st2[num];else st2[num]=v;curData.stickers=st2;
        try{await apiPost('save',{id:curUser,stickers:st2});closeModal();renderAlbum(document.getElementById('ac'));toast('Cromo #'+num+' guardado en la nube','suc')}catch(e){toast('Error al guardar','err')}};
    document.getElementById('s0').addEventListener('click',()=>setQ(0));

    document.getElementById('s2').addEventListener('click',()=>setQ(2));
    document.getElementById('s3').addEventListener('click',()=>setQ(3));

    <div class="fb" id="sf"><button class="fbt ${searchFilter==='missing'?'on':''}" data-sf="missing">Cromos que me faltan</button><button class="fbt ${searchFilter==='allrep'?'on':''}" data-sf="allrep">Todos los repetidos</button></div><div id="search-results" style="padding-top:8px"><div style="text-align:center;padding:24px;color:var(--muted)"><div class="ldg" style="margin:0 auto 8px"></div>Buscando en la nube...</div></div>`;

        let gh='';

function showMatches(num){

        c.innerHTML=`<div class="text-center p-4 pb-2"><div style="width:90px;height:120px;border-radius:10px;border:3px solid ${iH?'var(--ok)':'var(--err)'};margin:0 auto 10px;background:var(--bg2);display:flex;flex-direction:column;overflow:hidden"><div style="height:6px;background:${st.cl}"></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px"><div class="fd" style="font-size:1.5rem">${st.num}</div><div style="font-size:.8rem;font-weight:600">${st.n}</div><div style="font-size:.65rem;color:var(--muted)">${st.tn}</div></div></div><div style="font-size:.8rem;color:${iH?'var(--ok)':'var(--err)'}">${iH?'Ya lo tienes':'Te falta'}</div></div><div style="padding:0 16px 8px;font-size:.85rem;font-weight:600;color:var(--muted)">Quienes lo tienen</div><div id="match-list"><div style="text-align:center;padding:16px;color:var(--muted)"><div class="ldg" style="margin:0 auto 8px;width:24px;height:24px;border-width:2px"></div></div></div>`;

/* ================================================================
   RENDER: MENSAJES
   ================================================================ */
async function renderMsgs(c){
    c.innerHTML=`<div class="p-4 pb-2"><div class="fd" style="font-size:1.4rem;color:var(--accent);margin-bottom:4px">Mensajes</div><div style="font-size:.8rem;color:var(--muted)">Conversaciones en la nube</div></div><div id="conv-list"><div style="text-align:center;padding:24px;color:var(--muted)"><div class="ldg" style="margin:0 auto 8px"></div>Cargando...</div></div>`;
    try{
        const convs=await apiGet({a:'convs',id:curUser});
        const cl=document.getElementById('conv-list');
        if(!convs.length){cl.innerHTML=`<div class="emp"><i class="fas fa-comments"></i><div>Sin conversaciones</div></div>`;return}
        // Obtener nombres de otros usuarios
        const users=await apiGet({a:'users'});
        const uMap={};users.forEach(u=>uMap[u.id]=u);
        let h='';
        convs.forEach(cv=>{
            const oid=cv.users.find(u=>u!==curUser);
            const other=uMap[oid];if(!other)return;
            const last=cv.messages[cv.messages.length-1];
            const unread=cv.messages.filter(m=>m.from!==curUser&&!m.read).length;
            h+=`<div class="mt ${unread?'mu':''}" data-ck="${cv.key}" data-oid="${oid}"><div class="ma" style="background:hsl(${uidC(oid)},60%,35%)">${other.name[0]}</div><div style="flex:1;min-width:0"><div class="flex justify-between items-center"><span style="font-size:.85rem;font-weight:600">${other.name}</span><span style="font-size:.62rem;color:var(--muted)">${fmtT(last?.time)}</span></div><div style="font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">${last?esc(last.text.substring(0,50)):''}</div></div></div>`;
        });
        cl.innerHTML=h;
        cl.querySelectorAll('[data-ck]').forEach(el=>el.addEventListener('click',()=>openChat(el.dataset.ck,el.dataset.oid)));
    }catch(e){document.getElementById('conv-list').innerHTML=`<div class="emp"><i class="fas fa-wifi"></i><div>Error de conexion</div></div>`}
}

function openChatWith(oid){openChat(null,oid)}
async function openChat(key,oid){
    if(!key)key=[curUser,oid].sort().join('-');
    chatKey=key;chatWith=oid;
    const users=await apiGet({a:'users'});
    const other=users.find(u=>u.id===oid);
    pushV(other?.name||oid,(c)=>renderChat(c));
}

async function renderChat(c){
    try{
        await apiGet({a:'read',key:chatKey,id:curUser});
        const conv=await apiGet({a:'conv',key:chatKey});
        let h=`<div class="cmsg" id="chat-msgs">`;
        (conv.messages||[]).forEach(m=>{h+=`<div class="cb ${m.from===curUser?'sx':'rx'}">${esc(m.text)}<div class="btm">${fmtT(m.time)}</div></div>`});
        h+=`</div><div class="cib"><input type="text" class="cin" id="chat-inp" placeholder="Escribe un mensaje..."><button class="csn" id="chat-send" aria-label="Enviar"><i class="fas fa-paper-plane"></i></button></div>`;
        c.innerHTML=h;const msgs=document.getElementById('chat-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
        document.getElementById('chat-send').addEventListener('click',sendMsg);
        document.getElementById('chat-inp').addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg()});
    }catch(e){c.innerHTML=`<div class="emp"><i class="fas fa-wifi"></i><div>Error de conexion</div></div>`}
}

async function sendMsg(){
    const inp=document.getElementById('chat-inp'),txt=inp.value.trim();if(!txt)return;inp.value='';
    try{
        await apiPost('msg',{key:chatKey,from:curUser,text:txt});
        renderChat(document.getElementById('ac'));
    }catch(e){toast('Error al enviar','err')}
}

    });
}

async function renderAdmin(c){
    c.innerHTML=`<div class="p-4 pb-2"><div class="fd" style="font-size:1.4rem;color:var(--accent);margin-bottom:4px">Panel de Administracion</div><div style="font-size:.8rem;color:var(--muted)">Datos guardados en Vercel KV (nube)</div></div>
    <div class="px-4 mb-3"><button class="bp" id="btn-newcode"><i class="fas fa-plus"></i> Generar nuevo codigo</button></div>
    <div class="px-4 mb-3"><button class="bs" style="width:100%;display:block;text-align:center" id="btn-demo"><i class="fas fa-database"></i> Cargar datos de demostracion</button></div>
    <div class="px-4 mb-3"><button class="bs" style="width:100%;display:block;text-align:center;border-color:var(--err);color:var(--err)" id="btn-resetdb"><i class="fas fa-trash"></i> Reiniciar toda la base de datos</button></div>
    <div style="padding:0 16px 8px;font-size:.85rem;font-weight:600;color:var(--muted)">Usuarios</div><div id="admin-list"><div style="text-align:center;padding:16px;color:var(--muted)"><div class="ldg" style="margin:0 auto 8px"></div>Cargando...</div></div>`;
    document.getElementById('btn-newcode').addEventListener('click',()=>{
        const mb=document.getElementById('modal-body');
        mb.innerHTML=`<div style="font-size:1rem;font-weight:700;margin-bottom:12px">Nuevo codigo</div><input type="text" class="rinp" id="nw-name" placeholder="Nombre del cliente" style="margin-bottom:8px"><input type="tel" class="rinp" id="nw-phone" placeholder="Telefono (opcional)" style="margin-bottom:12px"><div id="nw-res" style="display:none;margin-bottom:12px;padding:16px;background:var(--bg2);border-radius:10px;text-align:center"><div style="font-size:.72rem;color:var(--muted);margin-bottom:6px">Codigo de acceso:</div><div id="nw-code" class="fd" style="font-size:2rem;color:var(--accent)"></div></div><div class="flex gap-3"><button class="bs flex-1" id="nwc">Cancelar</button><button class="bp flex-1" id="nwg">Generar</button></div>`;
        openModal();document.getElementById('nwc').addEventListener('click',closeModal);
        document.getElementById('nwg').addEventListener('click',async()=>{
            const nm=document.getElementById('nw-name').value.trim();if(!nm){toast('Ingresa un nombre','err');return}
            const ph=document.getElementById('nw-phone').value.trim();
            const base=nm.substring(0,5).toUpperCase().replace(/[^A-Z0-9]/g,'')+String(Math.floor(Math.random()*90)+10);
            let code=base,tries=0;while(tries<99){try{const r=await apiPost('adminCreate',{id:code,name:nm,phone:ph});if(r.error){code=base+tries;tries++}else{document.getElementById('nw-res').style.display='block';document.getElementById('nw-code').textContent=r.code;document.getElementById('nw-name').disabled=true;document.getElementById('nw-phone').disabled=true;toast('Codigo generado','suc');renderAdmin(document.getElementById('ac'));break}}catch(e){code=base+tries;tries++}}
        });
    });
    document.getElementById('btn-demo').addEventListener('click',async()=>{
        try{await apiGet({a:'initDemo'});toast('Datos de demo cargados','suc');renderAdmin(document.getElementById('ac'))}catch(e){toast('Error al cargar demo','err')}
    });
    document.getElementById('btn-resetdb').addEventListener('click',()=>{
        const mb=document.getElementById('modal-body');
        mb.innerHTML=`<div style="text-align:center;margin-bottom:16px"><i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--err);margin-bottom:10px;display:block"></i><div style="font-size:1rem;font-weight:700">Reiniciar base de datos</div><div style="font-size:.82rem;color:var(--muted)">Se eliminara TODO de la nube.</div></div><div class="flex gap-3"><button class="bs flex-1" id="dbc">Cancelar</button><button class="bsm bdn flex-1" style="padding:12px;font-size:.85rem;border-radius:10px" id="dbo">Reiniciar</button></div>`;
        openModal();document.getElementById('dbc').addEventListener('click',closeModal);
        document.getElementById('dbo').addEventListener('click',async()=>{try{await apiGet({a:'adminReset'});closeModal();toast('Base reiniciada','inf');renderAdmin(document.getElementById('ac'))}catch(e){toast('Error','err')}});
    });
    try{
        const users=await apiGet({a:'users'});
        const al=document.getElementById('admin-list');
        if(!users.length){al.innerHTML=`<div class="emp" style="padding:24px"><i class="fas fa-user-plus"></i><div>No hay usuarios. Genera codigos o carga datos de demo.</div></div>`;return}
        let h='';users.forEach(u=>{
            const hc=ALL.filter(st=>(u.stickers||{})[st.num]).length,pct=Math.round(hc/TOTAL*100);
            h+=`<div class="ar"><div class="ma" style="width:34px;height:34px;font-size:.75rem;background:hsl(${uidC(u.id)},60%,35%)">${u.name[0]}</div><div style="flex:1;min-width:0"><div style="font-size:.8rem;font-weight:600">${u.name}</div><div class="fd" style="font-size:.65rem;color:var(--accent);letter-spacing:.08em">${u.id}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:.72rem;font-weight:600">${hc}/${TOTAL}</div><div class="apm" style="margin:3px auto 0"><div class="apf" style="width:${pct}%"></div></div></div><button style="background:none;border:none;color:var(--err);cursor:pointer;font-size:.8rem;padding:4px 6px" data-did="${u.id}" aria-label="Eliminar"><i class="fas fa-trash"></i></button></div>`;
        });
        al.innerHTML=h;
        al.querySelectorAll('[data-did]').forEach(b=>b.addEventListener('click',async()=>{
            try{await apiGet({a:'adminDelete',id:b.dataset.did});toast('Usuario eliminado','inf');renderAdmin(document.getElementById('ac'))}catch(e){toast('Error','err')}
        }));
    }catch(e){document.getElementById('admin-list').innerHTML=`<div class="emp"><i class="fas fa-wifi"></i><div>Error de conexion</div></div>`}
}

/* ================================================================
   PWA INSTALL
   ================================================================ */
let defPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();defPrompt=e;const b=document.createElement('div');b.id='install-ban';b.style.cssText='position:fixed;bottom:70px;left:16px;right:16px;z-index:60;padding:12px 16px;background:var(--card);border:1px solid var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;transform:translateY(20px);opacity:0;transition:all .4s';b.innerHTML=`<div><div style="font-size:.85rem;font-weight:600"><i class="fas fa-download" style="color:var(--accent);margin-right:6px"></i>Instalar App</div><div style="font-size:.7rem;color:var(--muted)">Pantalla de inicio</div></div><button class="bsm bay" style="padding:8px 16px;border-radius:8px;font-size:.8rem" id="btn-install">Instalar</button>`;document.body.appendChild(b);setTimeout(()=>{b.style.transform='translateY(0)';b.style.opacity='1'},500);document.getElementById('btn-install').addEventListener('click',()=>{if(!defPrompt)return;defPrompt.prompt();defPrompt.userChoice.then(()=>{defPrompt=null;b.remove()})})});
window.addEventListener('appinstalled',()=>{const b=document.getElementById('install-ban');if(b)b.remove();toast('App instalada','suc')});
</script>
