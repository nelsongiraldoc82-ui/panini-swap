<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Panini Swap</title>
<meta name="theme-color" content="#0a0f0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panini Swap">
<link rel="manifest" id="lm">
<link rel="apple-touch-icon" id="ai">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#060b08;--bg2:#0c1510;--card:#111c16;--card2:#182820;--accent:#c9a84c;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--txt:#e4e4e4;--muted:#5e7a6b;--border:#1a2e22;--grass:#0d4a2a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100dvh}
.fd{font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}
.scr{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column}
.scr.hid{display:none!important}

/* === PORTADA === */
#portada{background:linear-gradient(180deg,#020503 0%,#041a0c 40%,var(--grass) 85%,#073d1e 100%);z-index:100;align-items:center;justify-content:center;overflow:hidden}
.campo{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:min(600px,120vw);height:55%;opacity:.18;pointer-events:none}
.cm{position:absolute;top:50%;left:0;right:0;height:2px;background:#fff}
.cc{position:absolute;top:50%;left:50%;width:120px;height:120px;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%)}
.cdot{position:absolute;top:50%;left:50%;width:8px;height:8px;background:#fff;border-radius:50%;transform:translate(-50%,-50%)}
.cpa{position:absolute;top:0;left:50%;transform:translateX(-50%);width:220px;height:80px;border:2px solid #fff;border-top:none}
.cpb{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:220px;height:80px;border:2px solid #fff;border-bottom:none}
.cga{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:30px;border:2px solid #fff;border-top:none}
.cgb{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:30px;border:2px solid #fff;border-bottom:none}
.esq{position:absolute;width:20px;height:20px;border:2px solid #fff}
.es1{top:0;left:0;border-right:none;border-bottom:none;border-radius:20px 0 0 0}
.es2{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 20px 0 0}
.es3{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 20px}
.es4{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 20px 0}
.arco{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:100px;height:40px;pointer-events:none}
.atr{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,#888,#ccc,#888);border-radius:2px}
.atr.t{top:0}.atr.b{bottom:0}
.apo{position:absolute;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#888,#ccc,#888);border-radius:2px}
.apo.l{left:0}.apo.r{right:0}
.red{position:absolute;inset:4px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 8px),repeating-linear-gradient(0deg,rgba(255,255,255,.04) 0 1px,transparent 1px 8px)}
.balon{width:100px;height:100px;border-radius:50%;animation:bfl 3s ease-in-out infinite;background:radial-gradient(circle at 35% 30%,#fff,#f0f0f0 40%,#d0d0d0 70%,#b0b0b0);box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 -4px 12px rgba(0,0,0,.15),0 0 60px rgba(201,168,76,.2)}
@keyframes bfl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.carg{margin-top:28px;width:40px;height:40px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--accent);border-radius:50%;animation:spn .8s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}

/* === LOGIN === */
#login{background:linear-gradient(180deg,#020503,#041a0c 35%,var(--grass) 80%,#073d1e);z-index:50;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.campo2{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:min(600px,120vw);height:50%;opacity:.1;pointer-events:none}
.tarjeta{background:rgba(17,28,22,.92);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:32px 24px;width:100%;max-width:400px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:relative;z-index:2;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.tarjeta::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.minibal{width:44px;height:44px;border-radius:50%;display:inline-block;background:radial-gradient(circle at 35% 30%,#fff,#d0d0d0 80%);box-shadow:0 4px 16px rgba(0,0,0,.3);margin:0 auto 16px;display:block}
.inp{width:100%;padding:14px 16px;background:rgba(12,21,16,.8);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:1.1rem;letter-spacing:.15em;text-transform:uppercase;text-align:center;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}.inp::placeholder{color:var(--muted);letter-spacing:.05em;text-transform:none;font-size:.9rem}
.inp2{width:100%;padding:12px 14px;background:rgba(12,21,16,.8);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:.95rem;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s}.inp2:focus{border-color:var(--accent)}
.btnp{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#000;font-weight:700;font-size:.95rem;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.btnp:hover{background:#dbb85a}.btnp:disabled{opacity:.5;cursor:not-allowed}
.linkbtn{background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;text-decoration:underline}
.punto{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.punto.v{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.punto.r{background:var(--err);box-shadow:0 0 6px var(--err)}
.punto.c{background:var(--warn);animation:spn 1s linear infinite}

/* === APP === */
.blob{position:fixed;border-radius:50%;pointer-events:none;filter:blur(120px);opacity:.05;z-index:0}
.bl1{width:400px;height:400px;background:#0f5c33;top:-120px;left:-120px;animation:bbf 25s ease-in-out infinite}
.bl2{width:350px;height:350px;background:#c9a84c;bottom:-100px;right:-100px;animation:bbf 30s ease-in-out infinite reverse}
@keyframes bbf{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.1)}66%{transform:translate(-20px,30px) scale(.9)}}
#app{background:var(--bg);z-index:20}
#hdr{flex-shrink:0;padding:10px 16px;background:rgba(6,11,8,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 16px;scroll-behavior:smooth}
#nav{flex-shrink:0;display:flex;background:rgba(6,11,8,.95);backdrop-filter:blur(14px);border-top:1px solid var(--border);padding:4px 0 max(6px,env(safe-area-inset-bottom))}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:none;border:none;color:var(--muted);font-size:.62rem;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.nbtn i{font-size:1.15rem}.nbtn.on{color:var(--accent)}
.grd{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px;padding:0 16px}
.crt{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;background:var(--card);transition:transform .12s;aspect-ratio:3/4;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.crt:active{transform:scale(.94)}
.crt.mis{border:2px dashed var(--border);opacity:.3}
.crt.hav{border:2px solid var(--ok)}
.crt.rep{border:2px solid var(--warn)}
.crt .fra{height:4px;width:100%;flex-shrink:0}
.crt .cuerpo{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;gap:2px}
.crt .num{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--txt)}
.crt.mis .num{color:var(--muted)}
.crt .nomb{font-size:.52rem;color:var(--muted);text-align:center;line-height:1.15;max-height:2.2em;overflow:hidden}
.crt .badge{position:absolute;top:4px;right:4px;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.48rem;color:#fff;padding:0 3px;font-weight:700}
.badge.hb{background:var(--ok)}.badge.rb{background:var(--warn);color:#000}
.equip{margin-bottom:10px}
.eqhd{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.eqhd:hover{background:var(--card)}
.dotc{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.barrap{height:3px;background:var(--border);border-radius:2px;flex:1;max-width:100px}
.barrapf{height:100%;background:var(--accent);border-radius:2px}
.eqstick{overflow:hidden;transition:max-height .4s ease}.eqstick.col{max-height:0!important}
.filtro{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filtro::-webkit-scrollbar{display:none}
.fbtn{padding:6px 14px;border-radius:20px;font-size:.7rem;font-weight:600;white-space:nowrap;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.fbtn.on{background:var(--accent);color:#000;border-color:var(--accent)}
.rcard{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin:0 16px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rcard:hover{background:var(--card2)}
.minis{width:38px;height:50px;border-radius:5px;border:2px solid var(--err);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg2);overflow:hidden;gap:1px}
.minis .mf{height:3px;width:100%;flex-shrink:0}.minis .mn{font-family:'Bebas Neue',sans-serif;font-size:.62rem}
.convr{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.convr:hover{background:var(--card)}
.noleido{position:relative}.noleido::after{content:'';position:absolute;top:10px;right:10px;width:8px;height:8px;background:var(--accent);border-radius:50%}
.avat{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;flex-shrink:0;color:#fff}
.chatm{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.burb{max-width:80%;padding:10px 14px;border-radius:14px;font-size:.83rem;line-height:1.4;word-wrap:break-word}
.burb.env{background:rgba(201,168,76,.13);border-bottom-right-radius:4px;align-self:flex-end}
.burb.rec{background:var(--card);border-bottom-left-radius:4px;align-self:flex-start}
.burb .hora{font-size:.6rem;color:var(--muted);margin-top:4px}
.chatbar{display:flex;gap:8px;padding:8px 16px;background:rgba(6,11,8,.95);border-top:1px solid var(--border)}
.chatinp{flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--txt);font-size:.83rem;outline:none;font-family:'DM Sans',sans-serif}
.chatinp:focus{border-color:var(--accent)}
.envbtn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;color:#000;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modalbg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modalbg.abierto{opacity:1;pointer-events:all}
.modalcont{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px;transform:translateY(100%);transition:transform .3s}
.modalbg.abierto .modalcont{transform:translateY(0)}
.modalhan{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.toastel{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:200;padding:11px 20px;border-radius:10px;font-size:.83rem;font-weight:500;transition:transform .3s;max-width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toastel.abierto{transform:translateX(-50%) translateY(0)}
.toastel.suc{background:var(--ok);color:#000}
.toastel.err{background:var(--err);color:#fff}
.toastel.inf{background:var(--accent);color:#000}
.progreso{transform:rotate(-90deg)}
.progbg{fill:none;stroke:var(--border);stroke-width:3}
.progfill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dasharray .6s}
.statc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.statn{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}
.statl{font-size:.65rem;color:var(--muted);margin-top:3px;text-transform:uppercase}
.btns{padding:9px 16px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--txt);font-size:.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.btns:hover{border-color:var(--accent);color:var(--accent)}
.btnsm{padding:6px 12px;font-size:.72rem;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.bok{background:var(--ok);color:#000}
.bdel{background:var(--err);color:#fff}
.bacc{background:var(--accent);color:#000}
.vacio{text-align:center;padding:48px 24px;color:var(--muted)}.vacio i{font-size:2.5rem;margin-bottom:12px;opacity:.4;display:block}
.adminr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px}
.adminp{width:60px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.adminpf{height:100%;background:var(--accent);border-radius:3px}
@keyframes shm{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shb{background:linear-gradient(135deg,#e5e4e2 0%,#ffd700 25%,#e5e4e2 50%,#ffd700 75%,#e5e4e2 100%)!important;background-size:200% 200%!important;animation:shm 3s ease infinite!important}
.shs{background:linear-gradient(135deg,#c0c0c0 0%,#fff 25%,#c0c0c0 50%,#fff 75%,#c0c0c0 100%)!important;background-size:200% 200%!important;animation:shm 2.5s ease infinite!important}
.sho{background:linear-gradient(135deg,#b8860b 0%,#ffd700 30%,#b8860b 50%,#ffd700 80%,#b8860b 100%)!important;background-size:200% 200%!important;animation:shm 2s ease infinite!important}
.shd{background:linear-gradient(135deg,#00bfff 0%,#e0f7fa 25%,#00bfff 50%,#e0f7fa 75%,#00bfff 100%)!important;background-size:200% 200%!important;animation:shm 1.5s ease infinite!important}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<!-- PORTADA -->
<div id="portada" class="scr">
<div class="campo"><div class="cm"></div><div class="cc"></div><div class="cdot"></div><div class="cpa"></div><div class="cpb"></div><div class="cga"></div><div class="cgb"></div><div class="esq es1"></div><div class="esq es2"></div><div class="esq es3"></div><div class="esq es4"></div></div>
<div class="arco"><div class="atr t"></div><div class="atr b"></div><div class="apo l"></div><div class="apo r"></div><div class="red"></div></div>
<div style="position:relative;z-index:3;text-align:center;display:flex;flex-direction:column;align-items:center">
<div style="display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border:1px solid rgba(201,168,76,.3);border-radius:20px;margin-bottom:16px;background:rgba(201,168,76,.05)"><i class="fas fa-futbol" style="color:var(--accent);font-size:.7rem"></i><span style="font-size:.65rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;font-weight:600">Mundial de Futbol</span></div>
<div class="fd" style="font-size:3.8rem;color:var(--accent);line-height:.9;text-shadow:0 0 40px rgba(201,168,76,.3),0 4px 20px rgba(0,0,0,.5)">PANINI</div>
<div style="font-size:.9rem;color:rgba(228,228,228,.6);margin-top:6px;font-weight:300;letter-spacing:.15em;text-transform:uppercase">Intercambiador de Cromos</div>
<div style="margin-top:20px;padding:10px 24px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.03)"><span style="font-size:.75rem;color:rgba(228,228,228,.5)">Album completo: <strong style="color:var(--accent)">980 cromos</strong> — 48 selecciones</span></div>
<div style="margin-top:20px"><div class="balon"></div></div>
<div class="carg"></div>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="scr hid">
<div class="campo2"><div class="cm"></div><div class="cc"></div><div class="cdot"></div><div class="cpa"></div><div class="cpb"></div><div class="esq es1"></div><div class="esq es2"></div><div class="esq es3"></div><div class="esq es4"></div></div>
<div class="arco"><div class="atr t"></div><div class="atr b"></div><div class="apo l"></div><div class="apo r"></div><div class="red"></div></div>
<div class="tarjeta">
<div style="text-align:center"><span class="minibal"></span></div>
<div style="text-align:center;margin-bottom:20px">
<div class="fd" style="font-size:2.2rem;color:var(--accent)">PANINI</div>
<div style="color:var(--muted);font-size:.68rem;margin-top:2px">980 Cromos — 48 Selecciones</div>
<div style="margin-top:8px"><span class="punto c" id="pdot"></span><span id="ptxt" style="font-size:.7rem;color:var(--muted)">Conectando...</span></div>
</div>
<div id="vistaLogin">
<label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:7px">Ingresa tu codigo de acceso</label>
<input type="text" id="codigoInp" class="inp" placeholder="Ej: CARLOS01" maxlength="12" autocomplete="off" spellcheck="false">
<div id="loginErr" style="color:var(--err);font-size:.78rem;margin-top:7px;text-align:center;min-height:1.2em"></div>
<button id="btnEntrar" class="btnp" style="margin-top:10px">Ingresar</button>
<div style="text-align:center;margin-top:14px"><button id="btnAdmin" class="linkbtn">Administrador</button></div>
</div>
<div id="vistaAdmin" style="display:none">
<label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:7px">Clave de administrador</label>
<input type="password" id="adminInp" class="inp" placeholder="Clave" style="letter-spacing:0">
<div id="adminErr" style="color:var(--err);font-size:.78rem;margin-top:7px;text-align:center;min-height:1.2em"></div>
<button id="btnAdminOk" class="btnp" style="margin-top:10px">Ingresar</button>
<div style="text-align:center;margin-top:14px"><button id="btnVolver" class="linkbtn">Volver al login</button></div>
</div>
</div>
</div>

<!-- APP -->
<div class="blob bl1"></div><div class="blob bl2"></div>
<div id="app" class="scr hid">
<header id="hdr">
<div style="display:flex;align-items:center;gap:12px"><span class="fd" style="font-size:1.3rem;color:var(--accent)">PANINI</span><span id="htitulo" style="font-size:.72rem;color:var(--muted)"></span></div>
<div style="display:flex;align-items:center;gap:8px"><button id="btnAtras" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;display:none"><i class="fas fa-arrow-left"></i></button><button id="btnSalir" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem"><i class="fas fa-sign-out-alt"></i></button></div>
</header>
<main id="cnt"></main>
<nav id="nav">
<button class="nbtn on" data-t="album"><i class="fas fa-book-open"></i><span>Album</span></button>
<button class="nbtn" data-t="buscar"><i class="fas fa-search"></i><span>Intercambiar</span></button>
<button class="nbtn" data-t="mensajes"><i class="fas fa-comment-dots"></i><span>Mensajes</span></button>
<button class="nbtn" data-t="perfil"><i class="fas fa-user"></i><span>Perfil</span></button>
</nav>
</div>

<div id="modal" class="modalbg"><div class="modalcont"><div class="modalhan"></div><div id="modalCuerpo"></div></div></div>
<div id="toast" class="toastel"></div>

<script>
// ================================================================
// FUNCIONES BASICAS (sin dependencias)
// ================================================================
function $(id){return document.getElementById(id)}
function mostrar(id){$(id).classList.remove('hid')}
function ocultar(id){$(id).classList.add('hid')}

var _toastTimer=null;
function toast(msg,tipo){
    var el=$('toast');el.textContent=msg;el.className='toastel '+tipo;
    setTimeout(function(){el.classList.add('abierto')},10);
    clearTimeout(_toastTimer);_toastTimer=setTimeout(function(){el.classList.remove('abierto')},2800);
}

function abrirModal(){$('modal').classList.add('abierto')}
function cerrarModal(){$('modal').classList.remove('abierto')}

function fmtHora(ts){
    if(!ts)return '';
    var d=Date.now()-ts;
    if(d<60000)return 'ahora';
    if(d<3600000)return Math.floor(d/60000)+'m';
    if(d<86400000)return Math.floor(d/3600000)+'h';
    return new Date(ts).getDate()+'/'+(new Date(ts).getMonth()+1);
}

function escapar(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function colorUid(id){
    var h=0;for(var i=0;i<id.length;i++)h=((h<<5)-h)+id.charCodeAt(i);
    return Math.abs(h)%360;
}

var API='/api/data';

function apiGet(params){
    var qs=[];for(var k in params)qs.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]));
    return fetch(API+'?'+qs.join('&')).then(function(r){return r.json()});
}

function apiPost(accion,body){
    return fetch(API+'?a='+accion,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
    }).then(function(r){return r.json()});
}

function hacerLogin(){
    var codigo=$('codigoInp').value.trim().toUpperCase();
    var err=$('loginErr');
    if(!codigo){err.textContent='Ingresa tu codigo';return}
    err.textContent='';
    var btn=$('btnEntrar');btn.disabled=true;btn.textContent='Verificando...';
    apiGet({a:'login',id:codigo}).then(function(r){
        btn.disabled=false;btn.textContent='Ingresar';
        if(r.error){err.textContent=r.error;return}
        usuarioActual=r.id;datosUsuario=r;
        try{localStorage.setItem('panini_code',codigo)}catch(e){}
        $('htitulo').textContent=r.name;
        ocultar('login');mostrar('app');irA('album');
        toast('Bienvenido, '+r.name,'suc');
    }).catch(function(){
        btn.disabled=false;btn.textContent='Ingresar';
        err.textContent='Error de conexion. Intenta de nuevo.';
    });
}

function hacerAdminLogin(){
    var pw=$('adminInp').value;
    if(pw===ADMIN_CLAVE){
        $('adminErr').textContent='';
        usuarioActual='__ADMIN__';$('htitulo').textContent='Admin';
        ocultar('login');mostrar('app');irA('album');toast('Modo administrador','inf');
    }else{$('adminErr').textContent='Clave incorrecta'}
}

function hacerLogout(){
    usuarioActual=null;datosUsuario=null;chatCon=null;chatLlave=null;pilaNav=[];
    try{localStorage.removeItem('panini_code')}catch(e){}
    $('codigoInp').value='';$('adminInp').value='';
    $('loginErr').textContent='';$('adminErr').textContent='';
    $('vistaAdmin').style.display='none';$('vistaLogin').style.display='block';
    ocultar('app');mostrar('login');
}

function dibujarAlbum(cnt){
    var st=datosUsuario.stickers||{};
    var tengo=0,repetidos=0;
    for(var i=0;i<STICKERS.length;i++){var q=st[STICKERS[i].num]||0;if(q>=1)tengo++;if(q>1)repetidos++}
    var pct=Math.round(tengo/TOTAL*100);
    var circ=2*Math.PI*46;
    var dash=pct/100*circ;

    var h='<div class="p-4 pb-2"><div style="display:flex;align-items:center;gap:16px"><div style="position:relative;width:100px;height:100px;flex-shrink:0"><svg width="100" height="100" class="progreso"><circle cx="50" cy="50" r="46" class="progbg"/><circle cx="50" cy="50" r="46" class="progfill" stroke-dasharray="'+dash+' '+circ+'"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span class="fd" style="font-size:1.5rem;color:var(--accent)">'+pct+'%</span></div></div><div style="flex:1"><div style="font-size:.8rem;color:var(--muted);margin-bottom:6px">'+tengo+' de '+TOTAL+' cromos</div><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+pct+'%;background:var(--ok);border-radius:3px"></div></div><div style="display:flex;gap:16px;font-size:.7rem"><span style="color:var(--ok)"><i class="fas fa-check-circle"></i> '+tengo+'</span><span style="color:var(--warn)"><i class="fas fa-clone"></i> '+repetidos+'</span><span style="color:var(--err)"><i class="fas fa-times-circle"></i> '+(TOTAL-tengo)+'</span></div></div></div></div>';
    h+='<div class="filtro" id="filtros">';
    var filtros=[['all','Todos'],['missing','Faltantes'],['have','Tenidos'],['repeated','Repetidos'],['extra','Panini Extra']];
    for(var f=0;f<filtros.length;f++){
        h+='<button class="fbtn'+(filtroAlbum===filtros[f][0]?' on':'')+'" data-f="'+filtros[f][0]+'">'+filtros[f][1]+'</button>';
    }
    h+='</div>';
    cnt.innerHTML=h;

    // Eventos de filtros
    var btnsFiltro=cnt.querySelectorAll('#filtros .fbtn');
    for(var bf=0;bf<btnsFiltro.length;bf++){
        btnsFiltro[bf].addEventListener('click',function(){filtroAlbum=this.getAttribute('data-f');dibujarAlbum($('cnt'))});
    }

    // Panini Extra
    if(filtroAlbum!=='missing'){
        var extras=[];for(var x=0;x<STICKERS.length;x++)if(STICKERS[x].tp==='extra')extras.push(STICKERS[x]);
        var fex=[];for(var fx=0;fx<extras.length;fx++){
            var s=extras[fx],q=st[s.num]||0;
            if(filtroAlbum==='all'||filtroAlbum==='extra')fex.push(s);
            else if(filtroAlbum==='have'&&q>=1)fex.push(s);
            else if(filtroAlbum==='repeated'&&q>1)fex.push(s);
        }
        if(fex.length>0){
            var ic=equiposColapsados['EXTRA'];
            var eh='<div class="equip"><div class="eqhd" data-eq="EXTRA"><div class="dotc" style="background:linear-gradient(90deg,#cd7f32,#c0c0c0,#ffd700,#00bcd4)"></div><span style="font-size:.85rem;font-weight:600;flex:1">Panini Extra</span><span style="font-size:.7rem;color:var(--muted)">'+extras.filter(function(x){return st[x.num]>=1}).length+'/'+extras.length+'</span><i class="fas fa-chevron-'+(ic?'right':'down')+'" style="color:var(--muted);font-size:.7rem"></i></div><div class="eqstick'+(ic?' col':'')+'" style="max-height:2000px"><div class="grd">';
            for(var fi=0;fi<fex.length;fi++){var fs=fex[fi],fq=st[fs.num]||0;eh+=htmlSticker(fs,fq===0?'mis':fq===1?'hav':'rep',fq)}
            eh+='</div></div></div>';
            cnt.insertAdjacentHTML('beforeend',eh);
            cnt.querySelector('[data-eq="EXTRA"]').addEventListener('click',function(){equiposColapsados['EXTRA']=!equiposColapsados['EXTRA'];dibujarAlbum($('cnt'))});
        }
    }

    // Equipos
    for(var eqi=0;eqi<EQUIPOS.length;eqi++){
        var equipo=EQUIPOS[eqi];
        var teamSt=[];for(var ts=0;ts<STICKERS.length;ts++)if(STICKERS[ts].team===equipo.c)teamSt.push(STICKERS[ts]);
        var hayT=0;for(var ht=0;ht<teamSt.length;ht++)if(st[teamSt[ht].num]>=1)hayT++;
        var filtrados=[];
        for(var ft=0;ft<teamSt.length;ft++){
            var fst=teamSt[ft],fqt=st[fst.num]||0;
            if(filtroAlbum==='all')filtrados.push(fst);
            else if(filtroAlbum==='missing'&&fqt===0)filtrados.push(fst);
            else if(filtroAlbum==='have'&&fqt>=1)filtrados.push(fst);
            else if(filtroAlbum==='repeated'&&fqt>1)filtrados.push(fst);
        }
        if(filtroAlbum==='missing'&&filtrados.length===0)continue;
        var eqc=equiposColapsados[equipo.c];
        var eqh='<div class="equip"><div class="eqhd" data-eq="'+equipo.c+'"><div class="dotc" style="background:'+equipo.cl+'"></div><span style="font-size:.85rem;font-weight:600;flex:1">'+equipo.n+'</span><div class="barrap"><div class="barrapf" style="width:'+Math.round(hayT/teamSt.length*100)+'%"></div></div><span style="font-size:.7rem;color:var(--muted);margin-left:6px">'+hayT+'/'+teamSt.length+'</span><i class="fas fa-chevron-'+(eqc?'right':'down')+'" style="color:var(--muted);font-size:.7rem;margin-left:4px"></i></div><div class="eqstick'+(eqc?' col':'')+'" style="max-height:3000px"><div class="grd">';
        for(var efi=0;efi<filtrados.length;efi++){
            var efs=filtrados[efi],efq=st[efs.num]||0;
            eqh+=htmlSticker(efs,efq===0?'mis':efq===1?'hav':'rep',efq);
        }
        eqh+='</div></div></div>';
        cnt.insertAdjacentHTML('beforeend',eqh);
        cnt.querySelector('[data-eq="'+equipo.c+'"]').addEventListener('click',(function(cod){return function(){equiposColapsados[cod]=!equiposColapsados[cod];dibujarAlbum($('cnt'))}})(equipo.c));
    }

    // Clicks en stickers
    var todosStickers=cnt.querySelectorAll('.crt[data-num]');
    for(var cs=0;cs<todosStickers.length;cs++){
        todosStickers[cs].addEventListener('click',(function(n){return function(){abrirSticker(n)}})(parseInt(todosStickers[cs].getAttribute('data-num'))));
    }
}

function htmlSticker(st,cls,qty){
    var badge='';
    if(cls==='hav')badge='<div class="badge hb"><i class="fas fa-check" style="font-size:.45rem"></i></div>';
    else if(cls==='rep')badge='<div class="badge rb">'+qty+'</div>';
    var xc=st.shm||'';
    var ico='';
    if(st.tp==='shield')ico='<i class="fas fa-shield-halved" style="font-size:.45rem;color:var(--muted)"></i>';
    else if(st.tp==='group')ico='<i class="fas fa-users" style="font-size:.45rem;color:var(--muted)"></i>';
    else if(st.tp==='extra')ico='<i class="fas fa-star" style="font-size:.45rem;color:'+st.cl+'"></i>';
    return'<div class="crt '+cls+'" data-num="'+st.num+'"><div class="fra '+xc+'" style="background:'+st.cl+'"></div><div class="cuerpo"><div class="num">'+st.num+'</div>'+ico+'<div class="nomb">'+st.n+'</div></div>'+badge+'</div>';
}

function abrirSticker(num){
    var st=SMAP[num],qty=(datosUsuario.stickers||{})[num]||0;
    var xc=st.shm||'';
    var mc=$('modalCuerpo');
    mc.innerHTML='<div style="text-align:center;margin-bottom:16px"><div style="width:100px;height:130px;border-radius:10px;border:3px solid '+(qty?'var(--ok)':'var(--border)')+';margin:0 auto 12px;background:var(--bg2);display:flex;flex-direction:column;overflow:hidden"><div style="height:8px;background:'+st.cl+'" class="'+xc+'"></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:8px"><div class="fd" style="font-size:1.8rem">'+st.num+'</div><div style="font-size:.85rem;font-weight:600">'+st.n+'</div><div style="font-size:.7rem;color:var(--muted)">'+st.tn+(st.rar?' — '+st.rar.toUpperCase():'')+'</div></div></div><div style="font-size:1.3rem"><span class="fd" style="color:'+(qty?'var(--ok)':'var(--err')+'">'+qty+'</span> <span style="font-size:.85rem;color:var(--muted)">ejemplar'+(qty!==1?'es':'')+'</span></div></div><div style="display:flex;gap:12px;margin-bottom:12px"><button class="btnsm bok" style="padding:10px;flex:1" id="st0"><i class="fas fa-times"></i> No tengo</button><button class="btnsm bok" style="padding:10px;flex:1" id="st1"><i class="fas fa-check"></i> Tengo 1</button><button class="btnsm bacc" style="padding:10px;flex:1" id="stplus"><i class="fas fa-plus"></i> +1</button></div><div style="display:flex;gap:8px"><button class="btnsm bdel" style="padding:10px;flex:1" id="stminus"><i class="fas fa-minus"></i> -1</button><button class="btnsm" style="padding:10px;flex:1;border:1px solid var(--warn);color:var(--warn)" id="st2">x2 Rep</button><button class="btnsm" style="padding:10px;flex:1;border:1px solid var(--warn);color:var(--warn)" id="st3">x3 Rep</button></div>';
    abrirModal();

    function setQty(v){
        if(v<0)v=0;
        var nuevos=JSON.parse(JSON.stringify(datosUsuario.stickers||{}));
        if(v===0)delete nuevos[num];else nuevos[num]=v;
        datosUsuario.stickers=nuevos;
        apiPost('save',{id:usuarioActual,stickers:nuevos}).then(function(){
            cerrarModal();dibujarAlbum($('cnt'));toast('Cromo #'+num+' guardado','suc');
        }).catch(function(){toast('Error al guardar','err')});
    }
    $('st0').addEventListener('click',function(){setQty(0)});
    $('st1').addEventListener('click',function(){setQty(1)});
    $('stplus').addEventListener('click',function(){setQty(((datosUsuario.stickers||{})[num]||0)+1)});
    $('stminus').addEventListener('click',function(){setQty(Math.max(0,((datosUsuario.stickers||{})[num]||0)-1))});
    $('st2').addEventListener('click',function(){setQty(2)});
    $('st3').addEventListener('click',function(){setQty(3)});
}

function dibujarBuscar(cnt){
    var st=datosUsuario.stickers||{};
    var faltantes=[],reps=[];
    for(var i=0;i<STICKERS.length;i++){var q=st[STICKERS[i].num]||0;if(q===0)faltantes.push(STICKERS[i]);if(q>1)reps.push(STICKERS[i])}

            for(var mc=0;mc<mCards.length;mc++){

function dibujarMensajes(cnt){
    cnt.innerHTML='<div class="p-4 pb-2"><div class="fd" style="font-size:1.4rem;color:var(--accent);margin-bottom:4px">Mensajes</div><div style="font-size:.8rem;color:var(--muted)">Conversaciones en la nube</div></div><div id="listaConvs"><div style="text-align:center;padding:24px;color:var(--muted)"><div class="carg" style="margin:0 auto 8px"></div>Cargando...</div></div>';
    apiGet({a:'convs',id:usuarioActual}).then(function(convs){
        return apiGet({a:'users'}).then(function(users){
            var uMap={};for(var u=0;u<users.length;u++)uMap[users[u].id]=users[u];
            var cl=$('listaConvs');
            if(!convs.length){cl.innerHTML='<div class="vacio"><i class="fas fa-comments"></i><div>Sin conversaciones</div></div>';return}
            var h='';
            for(var c=0;c<convs.length;c++){
                var cv=convs[c];
                var oid=cv.users[0]===usuarioActual?cv.users[1]:cv.users[0];
                var other=uMap[oid];if(!other)continue;
                var last=cv.messages[cv.messages.length-1];
                var noLeidos=0;for(var m=0;m<cv.messages.length;m++){if(cv.messages[m].from!==usuarioActual&&!cv.messages[m].read)noLeidos++}
                h+='<div class="convr'+(noLeidos?' noleido':'')+'" data-ck="'+cv.key+'" data-oid="'+oid+'"><div class="avat" style="background:hsl('+colorUid(oid)+',60%,35%)">'+other.name[0]+'</div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:.85rem;font-weight:600">'+other.name+'</span><span style="font-size:.62rem;color:var(--muted)">'+fmtHora(last?last.time:null)+'</span></div><div style="font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">'+(last?escapar(last.text.substring(0,50)):'')+'</div></div></div>';
            }
            cl.innerHTML=h;
            var items=cl.querySelectorAll('[data-ck]');
            for(var it=0;it<items.length;it++){
                items[it].addEventListener('click',(function(k,o){return function(){abrirChat(k,o)}})(items[it].getAttribute('data-ck'),items[it].getAttribute('data-oid')));
            }
        });
    }).catch(function(){$('listaConvs').innerHTML='<div class="vacio"><i class="fas fa-wifi"></i><div>Error de conexion</div></div>'});
}

function abrirChatCon(oid){abrirChat(null,oid)}

function abrirChat(key,oid){
    if(!key)key=[usuarioActual,oid].sort().join('-');
    chatLlave=key;chatCon=oid;
    apiGet({a:'users'}).then(function(users){
        var other=null;for(var u=0;u<users.length;u++)if(users[u].id===oid)other=users[u];
        empujarVista(other?other.name:oid,function(cnt){dibujarChat(cnt)});
    });
}

function dibujarChat(cnt){
    apiGet({a:'read',key:chatLlave,id:usuarioActual}).then(function(){
        return apiGet({a:'conv',key:chatLlave});
    }).then(function(conv){
        var msgs=conv.messages||[];
        var h='<div class="chatm" id="chatMsgs">';
        for(var m=0;m<msgs.length;m++){
            h+='<div class="burb '+(msgs[m].from===usuarioActual?'env':'rec')+'">'+escapar(msgs[m].text)+'<div class="hora">'+fmtHora(msgs[m].time)+'</div></div>';
        }
        h+='</div><div class="chatbar"><input type="text" class="chatinp" id="chatInp" placeholder="Escribe un mensaje..."><button class="envbtn" id="chatSend" aria-label="Enviar"><i class="fas fa-paper-plane"></i></button></div>';
        cnt.innerHTML=h;
        var ms=$('chatMsgs');if(ms)ms.scrollTop=ms.scrollHeight;
        $('chatSend').addEventListener('click',enviarMsg);
        $('chatInp').addEventListener('keydown',function(e){if(e.key==='Enter')enviarMsg()});
    }).catch(function(){cnt.innerHTML='<div class="vacio"><i class="fas fa-wifi"></i><div>Error de conexion</div></div>'});
}

function enviarMsg(){
    var inp=$('chatInp'),txt=inp.value.trim();if(!txt)return;inp.value='';
    apiPost('msg',{key:chatLlave,from:usuarioActual,text:txt}).then(function(){
        dibujarChat($('cnt'));
    }).catch(function(){toast('Error al enviar','err')});
}

function dibujarPerfil(cnt){
    var st=datosUsuario.stickers||{};
    var tengo=0,repTotal=0;
    for(var i=0;i<STICKERS.length;i++){var q=st[STICKERS[i].num]||0;if(q>=1)tengo++;if(q>1)repTotal+=q-1}
    var pct=Math.round(tengo/TOTAL*100);
    var reps=[];for(var r=0;r<STICKERS.length;r++)if(st[STICKERS[r].num]>1)reps.push(STICKERS[r]);

    var h='<div style="text-align:center;padding:16px"><div class="avat" style="width:64px;height:64px;font-size:1.5rem;background:hsl('+colorUid(usuarioActual)+',60%,35%);margin:0 auto 10px">'+datosUsuario.name[0]+'</div><div style="font-size:1.1rem;font-weight:700">'+datosUsuario.name+'</div><div style="font-size:.78rem;color:var(--muted);margin-top:2px">Codigo: <span class="fd" style="color:var(--accent);font-size:.9rem">'+usuarioActual+'</span></div>'+(datosUsuario.phone?'<div style="font-size:.78rem;color:var(--muted);margin-top:2px"><i class="fas fa-phone" style="font-size:.65rem"></i> '+datosUsuario.phone+'</div>':'')+'<div style="font-size:.68rem;color:var(--ok);margin-top:6px"><i class="fas fa-cloud"></i> Datos en la nube</div></div>';
    h+='<div style="display:flex;gap:12px;padding:0 16px;margin-bottom:16px"><div class="statc" style="flex:1"><div class="statn" style="color:var(--ok)">'+pct+'%</div><div class="statl">Completado</div></div><div class="statc" style="flex:1"><div class="statn" style="color:var(--warn)">'+repTotal+'</div><div class="statl">Rep. disponibles</div></div></div>';
    h+='<div style="padding:0 16px"><div style="font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:8px">Mis repetidos ('+reps.length+')</div></div>';
    if(!reps.length)h+='<div class="vacio" style="padding:24px"><i class="fas fa-clone"></i><div>Sin repetidos</div></div>';
    else{h+='<div class="grd">';for(var ri=0;ri<Math.min(reps.length,40);ri++){var rs=reps[ri];h+='<div class="crt rep" data-num="'+rs.num+'"><div class="fra '+(rs.shm||'')+'" style="background:'+rs.cl+'"></div><div class="cuerpo"><div class="num">'+rs.num+'</div><div class="nomb">'+rs.n+'</div></div><div class="badge rb">'+st[rs.num]+'</div></div>'}if(reps.length>40)h+='<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--muted);font-size:.75rem">... y '+(reps.length-40)+' mas</div>';h+='</div>'}
    h+='<div style="padding:20px 16px"><div style="height:1px;background:var(--border);margin-bottom:16px"></div><button class="btns" style="width:100%;display:block" id="btnCompartir"><i class="fas fa-share-alt"></i> Compartir mis repetidos</button></div>';
    cnt.innerHTML=h;

    var stCards=cnt.querySelectorAll('.crt[data-num]');
    for(var sc=0;sc<stCards.length;sc++){stCards[sc].addEventListener('click',(function(n){return function(){abrirSticker(n)}})(parseInt(stCards[sc].getAttribute('data-num'))))}

    $('btnCompartir').addEventListener('click',function(){
        var txt='Panini Swap - '+datosUsuario.name+' ('+usuarioActual+')\nRepetidos: '+reps.length+'\n\n';
        for(var i=0;i<Math.min(reps.length,30);i++)txt+='#'+reps[i].num+' '+reps[i].n+' ('+reps[i].tn+') x'+st[reps[i].num]+'\n';
        if(reps.length>30)txt+='... y '+(reps.length-30)+' mas';
        if(navigator.share)navigator.share({title:'Panini Swap',text:txt}).catch(function(){});
        else try{navigator.clipboard.writeText(txt);toast('Copiado','suc')}catch(e){toast('No se pudo copiar','err')}
    });
}

// ================================================================
// RENDER: ADMIN
// ================================================================
function dibujarAdmin(cnt){
    cnt.innerHTML='<div class="p-4 pb-2"><div class="fd" style="font-size:1.4rem;color:var(--accent);margin-bottom:4px">Panel Admin</div><div style="font-size:.8rem;color:var(--muted)">Vercel KV — Nube</div></div><div style="padding:0 16px;margin-bottom:12px"><button class="btnp" id="btnNuevo"><i class="fas fa-plus"></i> Generar codigo</button></div><div style="padding:0 16px;margin-bottom:12px"><button class="btns" style="width:100%;display:block;text-align:center" id="btnDemo"><i class="fas fa-database"></i> Cargar datos demo</button></div><div style="padding:0 16px;margin-bottom:12px"><button class="btns" style="width:100%;display:block;text-align:center;border-color:var(--err);color:var(--err)" id="btnReset"><i class="fas fa-trash"></i> Reiniciar base de datos</button></div><div style="padding:0 16px 8px;font-size:.85rem;font-weight:600;color:var(--muted)">Usuarios</div><div id="adminList"><div style="text-align:center;padding:16px;color:var(--muted)"><div class="carg" style="margin:0 auto 8px"></div>Cargando...</div></div>';

    $('btnNuevo').addEventListener('click',function(){
        $('modalCuerpo').innerHTML='<div style="font-size:1rem;font-weight:700;margin-bottom:12px">Nuevo codigo</div><input type="text" class="inp2" id="nwNombre" placeholder="Nombre del cliente" style="margin-bottom:8px"><input type="tel" class="inp2" id="nwTel" placeholder="Telefono (opcional)" style="margin-bottom:12px"><div id="nwRes" style="display:none;margin-bottom:12px;padding:16px;background:var(--bg2);border-radius:10px;text-align:center"><div style="font-size:.72rem;color:var(--muted);margin-bottom:6px">Codigo:</div><div id="nwCodigo" class="fd" style="font-size:2rem;color:var(--accent)"></div></div><div style="display:flex;gap:12px"><button class="btns" style="flex:1" id="nwCancel">Cancelar</button><button class="btnp" style="flex:1" id="nwGo">Generar</button></div>';
        abrirModal();
        $('nwCancel').addEventListener('click',cerrarModal);
        $('nwGo').addEventListener('click',function(){
            var nm=$('nwNombre').value.trim();if(!nm){toast('Ingresa nombre','err');return}
            var ph=$('nwTel').value.trim();
            var base=nm.substring(0,5).toUpperCase().replace(/[^A-Z0-9]/g,'')+String(Math.floor(Math.random()*90)+10);
            function intentar(code){
                apiPost('adminCreate',{id:code,name:nm,phone:ph}).then(function(r){
                    if(r.error){intentar(base+Math.floor(Math.random()*99));return}
                    $('nwRes').style.display='block';$('nwCodigo').textContent=r.code;
                    $('nwNombre').disabled=true;$('nwTel').disabled=true;
                    toast('Codigo generado','suc');dibujarAdmin($('cnt'));
                }).catch(function(){toast('Error de conexion','err')});
            }
            intentar(base);
        });
    });

    $('btnDemo').addEventListener('click',function(){apiGet({a:'initDemo'}).then(function(){toast('Datos demo cargados','suc');dibujarAdmin($('cnt'))}).catch(function(){toast('Error','err')})});
    $('btnReset').addEventListener('click',function(){
        $('modalCuerpo').innerHTML='<div style="text-align:center;margin-bottom:16px"><i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--err);display:block;margin-bottom:10px"></i><div style="font-weight:700">Reiniciar todo?</div></div><div style="display:flex;gap:12px"><button class="btns" style="flex:1" id="dbCancel">Cancelar</button><button class="btnsm bdel" style="padding:12px;font-size:.85rem;border-radius:10px;flex:1" id="dbOk">Reiniciar</button></div>';
        abrirModal();$('dbCancel').addEventListener('click',cerrarModal);
        $('dbOk').addEventListener('click',function(){apiGet({a:'adminReset'}).then(function(){cerrarModal();toast('Base reiniciada','inf');dibujarAdmin($('cnt'))}).catch(function(){toast('Error','err')})});
    });

    apiGet({a:'users'}).then(function(users){
        var al=$('adminList');
        if(!users.length){al.innerHTML='<div class="vacio" style="padding:24px"><i class="fas fa-user-plus"></i><div>Sin usuarios. Genera codigos o carga demo.</div></div>';return}
        var h='';
        for(var u=0;u<users.length;u++){
            var usr=users[u],hc=0;var ust=usr.stickers||{};
            for(var s=0;s<STICKERS.length;s++){if(ust[STICKERS[s].num]>=1)hc++}
            var pct=Math.round(hc/TOTAL*100);
            h+='<div class="adminr"><div class="avat" style="width:34px;height:34px;font-size:.75rem;background:hsl('+colorUid(usr.id)+',60%,35%)">'+usr.name[0]+'</div><div style="flex:1;min-width:0"><div style="font-size:.8rem;font-weight:600">'+usr.name+'</div><div class="fd" style="font-size:.65rem;color:var(--accent);letter-spacing:.08em">'+usr.id+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:.72rem;font-weight:600">'+hc+'/'+TOTAL+'</div><div class="adminp" style="margin:3px auto 0"><div class="adminpf" style="width:'+pct+'%"></div></div></div><button style="background:none;border:none;color:var(--err);cursor:pointer;font-size:.8rem;padding:4px 6px" data-del="'+usr.id+'"><i class="fas fa-trash"></i></button></div>';
        }
        al.innerHTML=h;
        var delBtns=al.querySelectorAll('[data-del]');
        for(var d=0;d<delBtns.length;d++){delBtns[d].addEventListener('click',(function(id){return function(){apiGet({a:'adminDelete',id:id}).then(function(){toast('Eliminado','inf');dibujarAdmin($('cnt'))}).catch(function(){toast('Error','err')})}})(delBtns[d].getAttribute('data-del')))}
    }).catch(function(){$('adminList').innerHTML='<div class="vacio"><i class="fas fa-wifi"></i><div>Error</div></div>'});
}

// ================================================================
// PWA INSTALL
// ================================================================
var installPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();installPrompt=e;
    var b=document.createElement('div');b.id='installBan';
    b.style.cssText='position:fixed;bottom:70px;left:16px;right:16px;z-index:60;padding:12px 16px;background:var(--card);border:1px solid var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;transform:translateY(20px);opacity:0;transition:all .4s';
    b.innerHTML='<div><div style="font-size:.85rem;font-weight:600"><i class="fas fa-download" style="color:var(--accent);margin-right:6px"></i>Instalar App</div><div style="font-size:.7rem;color:var(--muted)">Pantalla de inicio</div></div><button class="btnsm bacc" style="padding:8px 16px;border-radius:8px;font-size:.8rem" id="btnInstall">Instalar</button>';
    document.body.appendChild(b);
    setTimeout(function(){b.style.transform='translateY(0)';b.style.opacity='1'},500);
    $('btnInstall').addEventListener('click',function(){if(!installPrompt)return;installPrompt.prompt();installPrompt.userChoice.then(function(){installPrompt=null;b.remove()})});
});
window.addEventListener('appinstalled',function(){var b=$('installBan');if(b)b.remove();toast('App instalada','suc')});
</script>
</body>
</html>
